name: Test Harness

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'esbuild.js'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'esbuild.js'
  workflow_dispatch:
    inputs:
      phases:
        description: 'Phases to test (comma-separated, e.g., "0,1,2")'
        required: false
        default: 'all'
      mock_llm:
        description: 'Use mock LLM provider'
        required: false
        default: 'true'
        type: boolean

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Type check
        run: pnpm tsc --noEmit
        continue-on-error: true

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test -- --reporter=json --reporter=text --coverage
        env:
          JANUMICODE_LLM_PROVIDER: mock
          JANUMICODE_BUDGET_USD: 0.5

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  harness-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Run test harness
        run: |
          node dist/cli/janumicode.js test-harness \
            --phases=${{ github.event.inputs.phases || 'all' }} \
            --mock-llm=${{ github.event.inputs.mock_llm || 'true' }} \
            --output=json \
            --output-file=harness-results.json
        env:
          JANUMICODE_LLM_PROVIDER: mock
          JANUMICODE_BUDGET_USD: 1
          JANUMICODE_MAX_DURATION_MS: 300000
          JANUMICODE_MAX_COST_USD: 1
          JANUMICODE_FAILSAFE_ACTION: abort

      - name: Upload harness results
        uses: actions/upload-artifact@v4
        with:
          name: harness-results
          path: harness-results.json
          retention-days: 30

      - name: Check for failures
        run: |
          if [ -f harness-results.json ]; then
            failures=$(jq '.failures // 0' harness-results.json)
            if [ "$failures" -gt 0 ]; then
              echo "::error::Test harness reported $failures failures"
              exit 1
            fi
          fi

  coverage-trend:
    runs-on: ubuntu-latest
    needs: [unit-tests, harness-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Download harness results
        uses: actions/download-artifact@v4
        with:
          name: harness-results
          path: .

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update coverage history
        run: |
          node -e "
            const fs = require('fs');
            const historyFile = '.janumicode/coverage-history.json';
            const coverageFile = 'coverage/coverage-final.json';

            let history = [];
            try {
              history = JSON.parse(fs.readFileSync(historyFile, 'utf-8'));
            } catch {}

            const coverage = JSON.parse(fs.readFileSync(coverageFile, 'utf-8'));

            history.push({
              timestamp: new Date().toISOString(),
              commitSha: process.env.GITHUB_SHA,
              branch: process.env.GITHUB_REF_NAME,
              lineCoverage: coverage.total?.lines?.pct || 0,
              branchCoverage: coverage.total?.branches?.pct || 0,
              functionCoverage: coverage.total?.functions?.pct || 0,
              phaseCoverage: {}
            });

            // Keep last 100 entries
            if (history.length > 100) history = history.slice(-100);

            fs.mkdirSync('.janumicode', { recursive: true });
            fs.writeFileSync(historyFile, JSON.stringify(history, null, 2));
          "

      - name: Commit coverage history
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .janumicode/coverage-history.json
          git diff --quiet --staged || git commit -m "chore: update coverage history [skip ci]"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [build, lint, unit-tests, harness-tests]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Determine status
        id: status
        run: |
          if [ "${{ needs.harness-tests.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          elif [ "${{ needs.unit-tests.result }}" == "failure" ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Create summary
        run: |
          echo "## Test Harness Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Harness Tests | ${{ needs.harness-tests.result }} |" >> $GITHUB_STEP_SUMMARY
