# SonarQube / SonarLint configuration for JPW.
# Per the Engineering Constitution (tracker §11): scans run headless via the janumicode_v2
# SonarLint driver (see janumicode_v2/docs/sonarqube-headless-remediation-guide.md and the
# .sonar-remediation tooling). Complexity findings are addressed FULLY (NOTA BENE).
sonar.projectKey=janumi-professional-workbench
sonar.projectName=Janumi Professional Workbench (RPH engine)
sonar.sources=packages
sonar.tests=packages
sonar.test.inclusions=**/*.test.ts,**/__tests__/**
sonar.exclusions=**/dist/**,**/node_modules/**,**/coverage/**,**/*.test.ts,**/__tests__/**
sonar.typescript.tsconfigPaths=tsconfig.json,packages/*/tsconfig.json
sonar.sourceEncoding=UTF-8
