assurance_and_test_plan:
- W0 is non-mutating; no new tests authored.
- Conformance baseline for re-baselining = standing gate (check-types 21/21, Vitest, lint, boundary, Playwright 25/25).
- W0 SHALL NOT assert JPWB capability conformance without a cited test/trace; green gate proves kernel not production wiring.
security_authority_and_tenant_impact:
- CRITICAL DIV-W0-003 - no endpoint authenticates; demo fabricates a HUMAN principal; must not ship multi-tenant.
- JPWB honors no-runtime-authority-via-PWA (rule 10) and one-writable-authority (rule 1) at kernel level; verify per-capability later.
- No tenant impact from W0 (no code/data change).
observability_recovery_and_rollback:
- W0 rollback trivial: git revert of W0 doc commit(s); no runtime/data effect.
- Forward: JPWB restart-recovery / external-op reconciliation posture (WP-2-007) named to verify; production wiring is a hollow-layer candidate.
