current_state_findings:
  confirmed:
  - Single authoritative git repo at E:/Projects/hestami-ai; JPWB tracked directly; vestigial empty inner .git removed.
  - Three JanumiCode lineages: janumicode (v1, 452 files), janumicode_v2 (8270 files), janumiprofessionalworkbench (JPWB, subject of record).
  - The 11 legacy phases (INTAKE..REPLAN) are realized in janumicode/src/lib/workflow/orchestrator.ts with a central phase switch.
  - Legacy term "Product Lens" survives only in janumicode_v2 (15 files); JPWB has 0 "Product Lens" and 0 bare "Lens".
  - JPWB is a mature layered RPH engine (10 rph-* packages + rph-demo) with a passing conformance gate (check-types 21/21, tests, lint, boundary 159 modules/0 violations, Playwright 25/25).
  - Machine contracts are generated from packages/rph-contracts/vocab/*.json (single source of truth; WP-1-001 substance already met).
  - Persistence is event-sourced: five tables (professional_work_objects, professional_work_object_versions, domain_events, outbox_messages, command_receipts).
  - Prior harmonization produced W0-grade evidence: dead-kernel-census.txt, HARMONIZATION-FINDINGS.md/LOG.md, engine-reference-map.md, OPEN-QUESTIONS.md.
  inferred:
  - JPWB substantially satisfies master W1 (semantic kernel) and W2 (persistence/events/projections) and parts of W3/W4/W8.
  assumed:
  - The standing green gate reflects the current tree (re-confirm at G0).
  unknown:
  - Exact per-capability conformance depth of each master W1/W2 outcome in JPWB (conformant vs partial vs hollow).
