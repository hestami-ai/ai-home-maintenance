name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build
        run: bun run build
      - name: Type-check
        run: bun run check-types
      - name: Lint
        run: bun run lint
      - name: Boundary (package DAG + no-UI-in-core)
        run: bun run boundary
      - name: Format check
        run: bun run format:check
      - name: Test
        run: bun run test
