    <path d="M 7 2 C 1 2, 1 22, 7 22" stroke-width="2"/>
    <!-- Right arc bracket -->
    <path d="M 17 2 C 23 2, 23 22, 17 22" stroke-width="2"/>
    <!-- Vertical stem -->
