name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  required-gates:
    name: Required Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run required test gates
        run: pnpm run test:ci:required

      - name: Upload gate artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: required-gates-artifacts
          if-no-files-found: ignore
          path: |
            test-artifacts/**
            coverage/critical/**

  host-smoke:
    name: Extension Host Smoke
    runs-on: ubuntu-latest
    needs: required-gates
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run extension host smoke tests
        run: xvfb-run -a pnpm run test:host:smoke

      - name: Upload host artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-smoke-artifacts
          if-no-files-found: ignore
          path: |
            .vscode-test/**
            out/test/**
            test-artifacts/**
